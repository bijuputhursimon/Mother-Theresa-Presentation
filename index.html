<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Mother Teresa: Men's Group Presentation</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Georgia', serif; overflow: hidden; }
        .slide-deck { display: flex; width: 1300%; height: 100vh; transition: transform 0.5s ease; }
        .slide { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; box-sizing: border-box; text-align: center; }
        h1 { font-size: 3.5rem; color: var(--gold); }
        h2 { font-size: 2.8rem; border-bottom: 3px solid var(--gold); margin-bottom: 20px; }
        .btn-vid { background: var(--gold); border: none; padding: 20px 40px; font-weight: bold; cursor: pointer; border-radius: 50px; font-size: 1.4rem; margin-top: 20px; }
        .nav { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        button.nav-btn { padding: 10px 20px; background: #222; color: white; border: 1px solid #444; cursor: pointer; }
    </style>
</head>
<body>

<div class="slide-deck" id="deck">
    <div class="slide"><h1>Lessons from St. Mother Teresa</h1><p>Faith, Love, and Simplicity</p></div>
    <div class="slide"><h2>Who Was Mother Teresa?</h2><p>Founded Missionaries of Charity (1950). Nobel Peace Prize 1979.</p></div>
    
    <div class="slide">
        <h2>Spiritual Poverty in the West</h2>
        <p>Loneliness is the most difficult hunger to satiate.</p>
        <button class="btn-vid" onclick="openClip('podbbvAYVTg', 72, 92)">▶ Play: Loneliness (1:12 - 1:32)</button>
    </div>

    </div>

<div class="nav">
    <button class="nav-btn" onclick="change(-1)">PREVIOUS</button>
    <button class="nav-btn" onclick="change(1)">NEXT</button>
</div>

<script>
    let current = 0;
    function change(dir) {
        current = Math.max(0, Math.min(12, current + dir));
        document.getElementById('deck').style.transform = `translateX(-${current * 100}vw)`;
    }

    function openClip(id, start, end) {
        const width = 850;
        const height = 480;
        const left = (window.innerWidth / 2) - (width / 2);
        const top = (window.innerHeight / 2) - (height / 2);
        
        // IMPORTANT: origin=http://localhost:8080 is what fixes Error 153 on local servers
        const origin = window.location.origin;
        const url = `https://www.youtube.com/embed/${id}?start=${start}&end=${end}&autoplay=1&mute=0&rel=0&origin=${origin}`;
        
        window.open(url, 'ytPlayer', `width=${width},height=${height},left=${left},top=${top}`);
    }

    document.addEventListener('keydown', e => {
        if(e.key === "ArrowRight") change(1);
        if(e.key === "ArrowLeft") change(-1);
    });
</script>

</body>
</html>
